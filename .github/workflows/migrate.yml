name: DB Migrate
on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Prisma migrations via Evolution API image
        run: |
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_PROVIDER=postgresql \
            evoapicloud/evolution-api:latest \
            /bin/bash -c "npm run db:deploy"